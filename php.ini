; SECURITY FIX: More reasonable limits to prevent DoS attacks
allow_url_fopen = On
display_errors = Off
enable_dl = Off
file_uploads = On
max_execution_time = 300          ; SECURITY FIX: Reduced from 50000 (13.8hrs) to 300 (5min)
max_input_time = 300              ; SECURITY FIX: Reduced from 20000 to 300
max_input_vars = 10000
memory_limit = 256M               ; SECURITY FIX: Reduced from 2048M to 256M
post_max_size = 20M               ; SECURITY FIX: Reduced from 120M to 20M
session.gc_maxlifetime = 1440
session.save_path = "/var/cpanel/php/sessions/alt-php80"
upload_max_filesize = 10M         ; SECURITY FIX: Reduced from 90M to 10M
zlib.output_compression = Off
